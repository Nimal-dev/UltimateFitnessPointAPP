name: ultimate_fitness
description: Ultimate Fitness mobile app - Your comprehensive fitness companion.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/UltimateApp_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B0F19"
  image: assets/images/UltimateApp_logo.png
  android_12:
    image: assets/images/UltimateApp_logo.png
    color: "#0B0F19"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/UltimateApp_logo.png
